<head>
  <meta charset="UTF-8" />

  <!-- ===============================

    content="Contacte CipleOnline.pt para qualquer dúvida sobre o exame CIPLE, sua conta ou nossa plataforma de treino. Resposta rápida.">

  <link rel="canonical" href="https://cipleonline.pt/contacto">

  <!-- ===============================
       OPEN GRAPH
  ================================== -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_PT">
  <meta property="og:title" content="Contacto – Preparação CIPLE">
  <meta property="og:description"
    content="Precisa de ajuda com o exame CIPLE ou seu acesso à plataforma? Escreva-nos e responderemos rapidamente.">
  <meta property="og:url" content="https://cipleonline.pt/contacto">
  <meta property="og:image" content="https://cipleonline.pt/assets/images/og-default.jpg">

  <!-- ===============================
       TWITTER CARDS
  ================================== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contacto – Preparação CIPLE">
  <meta name="twitter:description"
    content="Obtenha suporte ou tire suas dúvidas sobre o exame CIPLE e nossa plataforma de exercícios.">
  <meta name="twitter:image" content="https://cipleonline.pt/assets/images/og-default.jpg">

  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/contact.css">

  <!-- Inline success/error message styles -->
  <style>
    .contact-feedback {
      display: none;
      margin-top: 1rem;
      font-size: 1rem;
      padding-left: 0.2rem;
    }
    .contact-feedback.success { color: #1b7f3b; }
    .contact-feedback.error { color: #b71c1c; }
  </style>

</head>

<body>

<header class="site-header">
  <div class="header-inner">

    <div class="header-left">
      <a href="/" class="brand-link">
        <img src="/assets/images/pt.svg" alt="Portugal">
        <div class="brand-title">CipleOnline.pt</div>
      </a>
    </div>

    <div class="header-center">
      <nav class="header-nav">
        <a href="/sobre-o-exame/">Sobre o exame</a>
        <a href="/teste-gratuito/">Teste grátis</a>
        <a href="/artigos/">Artigos</a>
        <a href="/contacto/">Contacto</a>
        <a href="https://civiclearn.com/ciple/login">Login</a>
      </nav>
    </div>

    <div class="header-right">
      <div class="brand-powered">powered by <span>CivicLearn</span></div>
      <a href="https://civiclearn.com/ciple/checkout" class="btn-small-purple">Inscrição</a>
    </div>

  </div>
</header>


<!-- MAIN CONTENT -->
<main class="contact-main">

  <h1 class="contact-title">Contacto</h1>

  <div class="contact-card">

    <!-- AJAX contact form -->
    <form id="contactForm" class="contact-form">
	
      <input type="text" name="company" tabindex="-1" autocomplete="off" style="display:none">

      <div class="field">
        <label>Nome*</label>
        <input type="text" name="name" required>
      </div>

      <div class="field">
        <label>E-mail*</label>
        <input type="email" name="_replyto" required>
      </div>

      <div class="field">
        <label>Mensagem*</label>
        <textarea name="message" required></textarea>
      </div>

      <button type="submit" class="contact-submit">Enviar mensagem</button>

      <!-- Success & error messages -->
      <div id="successMessage" class="contact-feedback success">
        Sua mensagem foi enviada com sucesso.
      </div>

      <div id="errorMessage" class="contact-feedback error">
        Ocorreu um erro. Por favor, tente novamente.
      </div>

    </form>

  </div>

</main>


<!-- FOOTER -->
<footer class="cl-footer">
  <div class="cl-footer-inner">
    © <span id="footer-year"></span> 
    <span class="cl-footer-brand">CivicLearn</span> by Testrada – Todos os direitos reservados.
  </div>
</footer>


<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;

  // Honeypot check
  if (form.querySelector('input[name="company"]').value) {
    return; 
  }

  const success = document.getElementById("successMessage");
  const error = document.getElementById("errorMessage");
  const submitBtn = form.querySelector('button[type="submit"]');

  success.style.display = "none";
  error.style.display = "none";

  submitBtn.disabled = true;
  const originalText = submitBtn.innerText;
  submitBtn.innerText = "Enviando...";

  const payload = {
    site: window.location.hostname,
    page: window.location.pathname,
    name: form.querySelector('input[name="name"]').value,
    email: form.querySelector('input[name="_replyto"]').value,
    message: form.querySelector('textarea[name="message"]').value
  };

  try {
    const response = await fetch("https://civiclearn.app.n8n.cloud/webhook/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      success.style.display = "block";
      form.reset();
      submitBtn.style.display = "none";
    } else {
      throw new Error("Request failed");
    }

  } catch (err) {
    error.style.display = "block";
    submitBtn.disabled = false;
    submitBtn.innerText = originalText;
  }
});
</script>

<script>
  document.getElementById("footer-year").textContent = new Date().getFullYear();
</script>

</body>
</html>
